<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Gaceta del Piso</title>
    <link rel="icon" type="image/png" href="./periodico%20(1).png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="paper-noise"></div>

    <header class="masthead">
      <p class="edition">Edición de compañeros</p>
      <h1>La Gaceta del Piso</h1>
      <p class="subtitle">Novedades, anuncios y vida en común</p>
      <nav class="top-nav" aria-label="Principal">
        <a class="nav-link active" href="./index.html">Inicio</a>
        <a id="authNavLink" class="nav-link" href="./login.html">Iniciar sesión</a>
        <a id="adminPublishLink" class="nav-link admin-only hidden" href="./publish.html">Publicar</a>
      </nav>
    </header>

    <main class="layout">
      <section class="column main-column feed-column">
        <h2 class="section-title">Ultimos titulares</h2>
        <div id="postsContainer" class="posts-grid"></div>
        <p id="emptyState" class="empty-state hidden">
          Aun no hay publicaciones. El admin puede crear la primera noticia.
        </p>
      </section>
    </main>

    <template id="postTemplate">
      <article class="post-card">
        <img class="post-image hidden" alt="Foto de la noticia" loading="lazy" />

        <div class="post-top-text">
          <p class="post-date"></p>
          <h3 class="post-title"></h3>
          <p class="post-excerpt"></p>
        </div>

        <div class="post-bottom-block">
          <p class="post-content"></p>
          <section class="post-comments">
            <h4>Comentarios</h4>
            <div class="comments-list"></div>
            <form class="comment-form">
              <label>
                Comentario
                <textarea class="comment-content" rows="3" maxlength="500" required></textarea>
              </label>
              <button type="submit" class="btn btn-ink">Comentar</button>
              <p class="comment-status" aria-live="polite"></p>
            </form>
          </section>
        </div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
