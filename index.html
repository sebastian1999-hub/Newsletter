<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Gaceta del Piso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="paper-noise"></div>

    <header class="masthead">
      <p class="edition">Edicion de companeros</p>
      <h1>La Gaceta del Piso</h1>
      <p class="subtitle">Novedades, anuncios y vida en comun</p>
      <div class="header-actions">
        <button id="adminToggleBtn" class="btn btn-ink">Admin</button>
      </div>
    </header>

    <main class="layout">
      <section class="column main-column">
        <div id="postBox" class="notice-box collapsible">
          <h3>Post</h3>

          <section id="adminPanel" class="admin-panel" aria-live="polite">
            <h3>Panel de redaccion</h3>

            <div id="authState" class="auth-state">No has iniciado sesion.</div>

            <form id="loginForm" class="stack-form">
              <label for="email">Email admin</label>
              <input id="email" type="email" placeholder="admin@ejemplo.com" required />

              <label for="password">Contrasena</label>
              <input id="password" type="password" required />

              <button type="submit" class="btn btn-ink">Entrar</button>
            </form>

            <form id="postForm" class="stack-form hidden">
              <label for="title">Titular</label>
              <input id="title" type="text" maxlength="120" required />

              <label for="excerpt">Entradilla</label>
              <textarea
                id="excerpt"
                rows="3"
                maxlength="220"
                placeholder="Resumen corto"
                required
              ></textarea>

              <label for="content">Contenido</label>
              <textarea id="content" rows="8" required></textarea>

              <label for="image">Foto (opcional)</label>
              <input id="image" type="file" accept="image/*" />

              <button type="submit" class="btn btn-accent">Publicar noticia</button>
              <button id="logoutBtn" type="button" class="btn btn-ghost">Cerrar sesion</button>
            </form>
          </section>
        </div>

        <h2 class="section-title">Ultimos titulares</h2>
        <div id="postsContainer" class="posts-grid"></div>
        <p id="emptyState" class="empty-state hidden">
          Aun no hay publicaciones. El admin puede crear la primera noticia.
        </p>
      </section>
    </main>

    <template id="postTemplate">
      <article class="post-card">
        <p class="post-date"></p>
        <h3 class="post-title"></h3>
        <img class="post-image hidden" alt="Foto de la noticia" loading="lazy" />
        <p class="post-excerpt"></p>
        <p class="post-content"></p>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
