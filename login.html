<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión | La Gaceta del Piso</title>
    <link rel="icon" type="image/png" href="./periodico%20(1).png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="paper-noise"></div>

    <header class="masthead">
      <p class="edition">Edición de compañeros</p>
      <h1>La Gaceta del Piso</h1>
      <p class="subtitle">Acceso de usuarios</p>
      <nav class="top-nav" aria-label="Principal">
        <a class="nav-link" href="./index.html">Inicio</a>
        <a id="authNavLink" class="nav-link active" href="./login.html">Iniciar sesión</a>
        <a id="adminPublishLink" class="nav-link admin-only hidden" href="./publish.html">Publicar</a>
      </nav>
    </header>

    <main class="layout">
      <section class="column main-column auth-column">
        <h2 class="section-title">Cuenta</h2>
        <p id="authState" class="auth-state">No has iniciado sesión.</p>

        <div id="authSwitch" class="auth-switch" role="tablist" aria-label="Tipo de acceso">
          <button id="showLoginFormBtn" type="button" class="auth-switch-btn active" role="tab">
            Iniciar sesión
          </button>
          <button id="showRegisterFormBtn" type="button" class="auth-switch-btn" role="tab">
            Crear cuenta
          </button>
        </div>

        <section id="loginPanel" class="auth-pane" aria-live="polite">
          <form id="loginForm" class="stack-form">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="usuario@ejemplo.com" required />

            <label for="password">Contraseña</label>
            <input id="password" type="password" required />

            <button type="submit" class="btn btn-ink">Entrar</button>
          </form>
        </section>

        <section id="registerPanel" class="register-panel auth-pane is-collapsed" aria-live="polite">
          <h3>Crear cuenta</h3>
          <form id="registerForm" class="stack-form">
            <label for="registerName">Nombre visible</label>
            <input id="registerName" type="text" maxlength="60" placeholder="Tu nombre" required />

            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" placeholder="nuevo@ejemplo.com" required />

            <label for="registerPassword">Contraseña</label>
            <input id="registerPassword" type="password" minlength="6" required />

            <button type="submit" class="btn btn-accent">Registrarme</button>
          </form>
        </section>

        <section id="profilePanel" class="profile-panel hidden" aria-live="polite">
          <h3>Perfil</h3>
          <img
            id="profileAvatarPreview"
            class="profile-avatar"
            src="./pablo.jpeg"
            alt="Foto de perfil"
          />

          <form id="profileForm" class="stack-form">
            <label for="profileName">Nombre visible</label>
            <input id="profileName" type="text" maxlength="60" placeholder="Tu nombre" required />

            <label for="profileAvatar">Foto de perfil</label>
            <input id="profileAvatar" type="file" accept="image/*" />

            <div class="profile-actions">
              <button type="submit" class="btn btn-accent">Guardar perfil</button>
              <button id="logoutBtn" type="button" class="btn btn-logout hidden">Cerrar sesión</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
