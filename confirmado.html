<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Correo Confirmado | La Gaceta del Piso</title>
    <link rel="icon" type="image/png" href="./periodico%20(1).png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="paper-noise"></div>

    <header class="masthead">
      <p class="edition">Edición de compañeros</p>
      <h1>La Gaceta del Piso</h1>
      <p class="subtitle">Confirmación de cuenta</p>
      <nav class="top-nav" aria-label="Principal">
        <a class="nav-link" href="./index.html">Inicio</a>
        <a class="nav-link" href="./login.html">Iniciar sesión</a>
      </nav>
    </header>

    <main class="layout">
      <section class="column main-column auth-column" style="text-align: center">
        <h2 id="confirmTitle" class="section-title">Correo confirmado</h2>
        <p id="confirmMessage">Tu cuenta ya está validada. Ya puedes iniciar sesión y comentar con tu perfil.</p>
        <p>
          <a class="btn btn-accent" href="./login.html">Ir a iniciar sesión</a>
        </p>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const errorCode = params.get("error_code");
      const confirmTitle = document.getElementById("confirmTitle");
      const confirmMessage = document.getElementById("confirmMessage");

      if (errorCode === "otp_expired") {
        confirmTitle.textContent = "Enlace ya usado o caducado";
        confirmMessage.textContent =
          "Este enlace de confirmacion ya no es valido. Si ya confirmaste antes, puedes iniciar sesion normalmente.";
      }
    </script>
  </body>
</html>
